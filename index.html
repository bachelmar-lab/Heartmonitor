<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Polar H10 Monitor 2.9 (Binary Import & Sync-Scroll)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
<style>
    body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding:10px; }
    h2 { text-align:center; color:#0f0; margin:5px 0; font-size: 18px; }
    button { width:100%; padding:14px; margin:4px 0; font-size:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
    .connect { background:#0f0; color:#000; }
    .btn-bin { background:#f80; color:#000; }
    .btn-import { background:#666; color:#fff; }
    .metrics-grid { display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin:10px 0; }
    .metric { background:#111; padding:10px; border-radius:10px; text-align:center; border: 1px solid #333; }
    .val { font-size:22px; font-weight:bold; color:#0f0; display:block; }
    .label { font-size:10px; color:#aaa; text-transform: uppercase; }
    canvas { background:#000; border-radius:10px; width:100%!important; border:1px solid #222; display:block; }
    #scroll-container { margin: 15px 0; display:none; }
    input[type=range] { width: 100%; height: 30px; }
    #debug-log { background:#111; color:#0f0; font-family:monospace; font-size:10px; height:50px; overflow-y:auto; padding:5px; margin-top:5px; }
</style>
</head>
<body>

<h2>Polar H10 Monitor 2.9</h2>

<button class="connect" onclick="connect()">SENSOR VERBINDEN</button>
<button id="ecgToggleBtn" onclick="toggleECG()" style="background:#555; color:#fff;">EKG STARTEN</button>
<button class="btn-bin" onclick="exportBinary()">SPEICHERN (BINÄR)</button>
<button class="btn-import" onclick="document.getElementById('fileInput').click()">BINÄR / CSV IMPORT</button>
<input type="file" id="fileInput" style="display:none" onchange="handleImport(event)">

<div class="metrics-grid">
  <div class="metric"><span id="bpm" class="val">--</span><span class="label">Puls (Ø)</span></div>
  <div class="metric"><span id="rmssd" class="val">--</span><span class="label">RMSSD (ms)</span></div>
  <div class="metric"><span id="sd1" class="val">--</span><span class="label">SD1 (ms)</span></div>
  <div class="metric"><span id="sd2" class="val">--</span><span class="label">SD2 (ms)</span></div>
</div>

<div id="scroll-container">
    <div style="font-size:11px; color:#aaa; text-align:center;">EKG ZEITLEISTE (SCROLLEN)</div>
    <input type="range" id="ekgScroll" min="0" value="0" oninput="updateScroll()">
</div>

<canvas id="ecgCanvas" width="800" height="150"></canvas>
<canvas id="lorentzCanvas" width="400" height="400" style="width:320px!important; margin:10px auto;"></canvas>

<div id="debug-log">> System bereit.</div>

<script>
const db = new Dexie("PolarDB");
db.version(3).stores({ samples: "++id, timestamp, type" });

let device, server, ecgActive = false;
let allRRData = [], fullECG = [], ecgDisplay = [];
let currentIndex = 0; // Für das rote Highlight im Lorentz Plot

function log(msg) {
    const l = document.getElementById("debug-log");
    l.innerHTML += "> " + msg + "<br>";
    l.scrollTop = l.scrollHeight;
}

// HRV Berechnung (Sanitized)
function calculateGlobalHRV() {
    const d = allRRData.map(r => r.val).filter(v => v >= 350 && v <= 1500);
    if (d.length < 5) return;
    let diffsSq = 0, count = 0;
    for(let i=1; i < d.length; i++) {
        let diff = d[i] - d[i-1];
        if (Math.abs(diff) < 450) { diffsSq += diff * diff; count++; }
    }
    const rmssd = Math.sqrt(diffsSq / (count || 1));
    const avg = d.reduce((a, b) => a + b) / d.length;
    const variance = d.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / d.length;
    const sdnn = Math.sqrt(variance);
    const sd1 = Math.sqrt(0.5 * Math.pow(rmssd, 2)), sd2 = Math.sqrt(Math.max(0, 2 * Math.pow(sdnn, 2) - Math.pow(sd1, 2)));

    document.getElementById("rmssd").innerText = rmssd.toFixed(1);
    document.getElementById("sd1").innerText = sd1.toFixed(1);
    document.getElementById("sd2").innerText = sd2.toFixed(1);
    document.getElementById("bpm").innerText = Math.round(60000 / avg);
}

// Binär Import
async function handleImport(event) {
    const file = event.target.files[0];
    const buffer = await file.arrayBuffer();
    const view = new DataView(buffer);
    
    if (file.name.endsWith('.bin')) {
        log("Lade Binärdatei...");
        allRRData = []; fullECG = [];
        let pos = 0;
        while (pos < buffer.byteLength) {
            let type = view.getUint8(pos);
            if (type === 0xAA) { // RR Paket
                let ts = view.getFloat64(pos + 1, true);
                let val = view.getUint16(pos + 9, true);
                allRRData.push({ ts, val });
                pos += 11;
            } else { // ECG Paket (Timestamp 8b + 0xEE 1b + Int32 4b + Deltas)
                let ts = view.getFloat64(pos, true); pos += 8;
                if (view.getUint8(pos) === 0xEE) {
                    let lastVal = view.getInt32(pos + 1, true);
                    fullECG.push({ ts, val: lastVal });
                    pos += 5;
                    // Deltas lesen bis zum nächsten Paket
                    while (pos < buffer.byteLength && view.getUint8(pos) !== 0xAA && (pos+8 >= buffer.byteLength || view.getUint8(pos+8) !== 0xEE)) {
                        lastVal += view.getInt16(pos, true);
                        fullECG.push({ ts, val: lastVal });
                        pos += 2;
                    }
                }
            }
        }
        document.getElementById("scroll-container").style.display = "block";
        document.getElementById("ekgScroll").max = fullECG.length - 600;
        log("Import fertig: " + allRRData.length + " RR / " + fullECG.length + " EKG");
        calculateGlobalHRV();
        updateScroll();
    }
}

function updateScroll() {
    const start = parseInt(document.getElementById("ekgScroll").value);
    ecgDisplay = fullECG.slice(start, start + 600).map(e => e.val);
    
    // Finde den zeitlich passenden RR-Punkt für das Highlight
    if (fullECG[start]) {
        const currentTime = fullECG[start].ts;
        currentIndex = allRRData.findIndex(r => r.ts >= currentTime);
    }
    drawECG();
    drawLorentz();
}

async function connect() {
    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ services: ['heart_rate'] }],
            optionalServices: ['battery_service', 'fb005c80-02e7-f387-1cad-8acd2d8df0c8']
        });
        server = await device.gatt.connect();
        document.getElementById("status").innerText = "Live";
        const hS = await server.getPrimaryService('heart_rate');
        const hC = await hS.getCharacteristic('heart_rate_measurement');
        await hC.startNotifications();
        hC.addEventListener('characteristicvaluechanged', e => {
            const v = e.target.value;
            let offset = (v.getUint8(0) & 0x01) ? 3 : 2;
            for (let i = offset; i < v.byteLength; i += 2) {
                const val = (v.getUint16(i, true) / 1024) * 1000;
                const ts = Date.now();
                allRRData.push({ ts, val });
                db.samples.add({ timestamp: ts, type: 'RR', val });
                calculateGlobalHRV();
            }
        });
        requestAnimationFrame(renderLoop);
    } catch (e) { log("Error: " + e.message); }
}

async function toggleECG() {
    const s = await server.getPrimaryService('fb005c80-02e7-f387-1cad-8acd2d8df0c8');
    const ctrl = await s.getCharacteristic('fb005c81-02e7-f387-1cad-8acd2d8df0c8');
    const data = await s.getCharacteristic('fb005c82-02e7-f387-1cad-8acd2d8df0c8');
    if (!ecgActive) {
        await data.startNotifications();
        data.addEventListener('characteristicvaluechanged', e => {
            const dv = e.target.value;
            const ts = Date.now();
            let lastVal;
            const batch = [];
            for(let i=10; i < dv.byteLength; i+=3) {
                let val = (dv.getUint8(i) | (dv.getUint8(i+1) << 8) | (dv.getUint8(i+2) << 16));
                if (val & 0x800000) val |= 0xFF000000;
                fullECG.push({ ts, val });
                if (fullECG.length > 5000) fullECG.shift(); // Nur im Live-Mode begrenzen
                batch.push(val);
            }
            // Speicher-Logik (Binär-Delta) wie 2.8...
            const buf = new ArrayBuffer(5 + (batch.length - 1) * 2);
            const v = new DataView(buf); v.setUint8(0, 0xEE); v.setInt32(1, batch[0], true);
            for(let i=1; i<batch.length; i++) v.setInt16(5+(i-1)*2, batch[i]-batch[i-1], true);
            db.samples.add({ timestamp: ts, type: 'ECG_BIN', val: new Uint8Array(buf) });
        });
        await ctrl.writeValue(new Uint8Array([0x02,0x00,0x00,0x01,0x82,0x00,0x01,0x01,0x0E,0x00]));
        ecgActive = true; document.getElementById("ecgToggleBtn").innerText="STOP";
    }
}

async function exportBinary() {
    const all = await db.samples.toArray();
    let parts = [];
    all.forEach(r => {
        if (r.type === 'RR') {
            const b = new ArrayBuffer(11); const v = new DataView(b);
            v.setUint8(0, 0xAA); v.setFloat64(1, r.timestamp, true); v.setUint16(9, r.val, true);
            parts.push(new Uint8Array(b));
        } else if (r.type === 'ECG_BIN') {
            const tsB = new ArrayBuffer(8); new DataView(tsB).setFloat64(0, r.timestamp, true);
            parts.push(new Uint8Array(tsB)); parts.push(r.val);
        }
    });
    const file = new File([new Blob(parts)], `Heart_${Date.now()}.bin`);
    if (navigator.share) await navigator.share({ files: [file] });
}

function drawECG() {
  const canvas = document.getElementById("ecgCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const data = ecgActive ? fullECG.slice(-600).map(e => e.val) : ecgDisplay;
  if (data.length < 2) return;
  let min = Math.min(...data), max = Math.max(...data), range = (max - min) || 1000;
  ctx.beginPath(); ctx.strokeStyle = "#0f0"; ctx.lineWidth = 1.5;
  for(let i=0; i<data.length; i++) {
    const x = i * (canvas.width / data.length);
    const y = 140 - ((data[i] - min) / range) * 130;
    if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawLorentz() {
    const canvas = document.getElementById("lorentzCanvas");
    const ctx = canvas.getContext("2d");
    const w = 400, p = 45, size = 340;
    ctx.clearRect(0, 0, w, w);
    ctx.strokeStyle = "#444"; ctx.strokeRect(p, 5, size, size);
    ctx.fillStyle = "#888"; ctx.font = "12px Arial";
    for(let v=400; v<=1400; v+=200) {
        let pos = p + ((v-400)/1000) * size;
        ctx.fillText(v, pos-12, size+25);
    }
    
    // Alle Punkte (Blassgrün)
    ctx.fillStyle = "rgba(0, 255, 0, 0.2)";
    for (let i = 1; i < allRRData.length; i++) {
        const x = p + ((allRRData[i-1].val - 400) / 1000) * size;
        const y = size - ((allRRData[i].val - 400) / 1000) * size;
        if(x >= p && x <= p+size && y >= 5 && y <= 5+size) {
            ctx.beginPath(); ctx.arc(x, y, 1.2, 0, 7); ctx.fill();
        }
    }

    // Highlight Punkt (ROT) - Synchronisiert zum EKG Scroll
    if (currentIndex > 0 && currentIndex < allRRData.length) {
        const x = p + ((allRRData[currentIndex-1].val - 400) / 1000) * size;
        const y = size - ((allRRData[currentIndex].val - 400) / 1000) * size;
        ctx.fillStyle = "red";
        ctx.beginPath(); ctx.arc(x, y, 5, 0, 7); ctx.fill();
        ctx.strokeStyle = "white"; ctx.stroke();
    }
}

function renderLoop() { if(ecgActive) { drawECG(); drawLorentz(); } requestAnimationFrame(renderLoop); }
</script>
</body>
</html>

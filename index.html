<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Polar H10 Monitor 3.4 (Fixed Save -> Share on Iphone)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
<style>
    body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding:10px; }
    h2 { text-align:center; color:#0f0; margin:5px 0; font-size: 18px; }
    button { width:100%; padding:14px; margin:4px 0; font-size:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
    .connect { background:#0f0; color:#000; }
    .btn-bin { background:#f80; color:#000; }
    .btn-import { background:#666; color:#fff; }
    #status-box { display:flex; justify-content:space-between; font-size:12px; background:#111; padding:8px; border-radius:8px; margin-bottom:5px; }
    .metrics-grid { display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin:10px 0; }
    .metric { background:#111; padding:10px; border-radius:10px; text-align:center; border: 1px solid #333; }
    .val { font-size:22px; font-weight:bold; color:#0f0; display:block; }
    .label { font-size:10px; color:#aaa; text-transform: uppercase; }
    canvas { background:#000; border-radius:10px; width:100%!important; border:1px solid #222; display:block; }
    #scroll-container { margin: 15px 0; display:none; background:#111; padding:10px; border-radius:8px; }
    input[type=range] { width: 100%; height: 35px; }
    #debug-log { background:#111; color:#0f0; font-family:monospace; font-size:10px; height:60px; overflow-y:auto; padding:5px; margin-top:5px; border:1px solid #333; }
</style>
</head>
<body>

<h2>Polar H10 Monitor 3.4</h2>

<div id="status-box">
  <span>Status: <b id="status">Bereit</b></span>
  <span>Punkte: <b id="rr-count">0</b></span>
  <span>Batt: <b id="batt">--</b>%</span>
</div>

<button class="connect" onclick="connect()">SENSOR VERBINDEN</button>
<button id="ecgToggleBtn" onclick="toggleECG()" style="background:#555; color:#fff;">EKG STARTEN</button>
<button class="btn-bin" onclick="exportBinary()">SPEICHERN (BINÄR)</button>
<button class="btn-import" onclick="document.getElementById('fileInput').click()">IMPORT</button>
<input type="file" id="fileInput" style="display:none" onchange="handleImport(event)">

<div class="metrics-grid">
  <div class="metric"><span id="bpm" class="val">--</span><span class="label">Puls (Ø)</span></div>
  <div class="metric"><span id="rmssd" class="val">--</span><span class="label">RMSSD (ms)</span></div>
  <div class="metric"><span id="sd1" class="val">--</span><span class="label">SD1 (ms)</span></div>
  <div class="metric"><span id="sd2" class="val">--</span><span class="label">SD2 (ms)</span></div>
</div>

<div id="scroll-container">
    <div style="font-size:11px; color:#aaa; text-align:center; margin-bottom:5px;">EKG ZEITLEISTE (REVIEW)</div>
    <input type="range" id="ekgScroll" min="0" value="0" oninput="updateScroll()">
</div>

<canvas id="ecgCanvas" width="800" height="160"></canvas>
<canvas id="lorentzCanvas" width="400" height="400" style="width:320px!important; margin:15px auto;"></canvas>

<div id="debug-log">> System bereit.</div>

<script>
const db = new Dexie("PolarDB");
db.version(3).stores({ samples: "++id, timestamp, type" });

let device, server, ecgActive = false;
let allRRData = [], fullECG = [], ecgDisplay = [];
let currentIndex = -1;
let dataCharacteristic = null; // Globale Referenz zum Stoppen merken
let ctrlCharacteristic = null; // Globale Referenz für Stop-Signal

function log(msg) {
    const l = document.getElementById("debug-log");
    l.innerHTML += "> " + msg + "<br>";
    l.scrollTop = l.scrollHeight;
}

// Zentrale HRV Berechnung
function calculateGlobalHRV() {
    const d = allRRData.map(r => r.val).filter(v => v >= 300 && v <= 1600);
    if (d.length < 5) return;
    
    let diffsSq = 0, count = 0;
    for(let i=1; i < d.length; i++) {
        let diff = d[i] - d[i-1];
        diffsSq += diff * diff;
        count++;
    }
    const rmssd = Math.sqrt(diffsSq / count);
    const avg = d.reduce((a, b) => a + b) / d.length;
    const sdnn = Math.sqrt(d.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / d.length);
    
    // SD1/SD2 Geometrie
    const sd1 = Math.sqrt(0.5 * Math.pow(rmssd, 2));
    const sd2 = Math.sqrt(Math.max(0, 2 * Math.pow(sdnn, 2) - Math.pow(sd1, 2)));

    document.getElementById("rmssd").innerText = rmssd.toFixed(1);
    document.getElementById("sd1").innerText = sd1.toFixed(1);
    document.getElementById("sd2").innerText = sd2.toFixed(1);
    document.getElementById("bpm").innerText = Math.round(60000 / avg);
    document.getElementById("rr-count").innerText = allRRData.length;
}

// FIX: Robusterer Binär-Parser
async function handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    
    reader.onload = async (e) => {
        const buffer = e.target.result;
        const view = new DataView(buffer);
        allRRData = []; fullECG = [];
        let pos = 0;
        log("Importiere " + file.name + "...");

        while (pos < buffer.byteLength) {
            let marker = view.getUint8(pos);
            
            if (marker === 0xAA) { // RR-Punkt
                let ts = view.getFloat64(pos + 1, true);
                let val = view.getUint16(pos + 9, true);
                allRRData.push({ ts, val });
                pos += 11;
            } else {
                // EKG Block: 8 Byte TS + 0xEE Markierung
                let ts = view.getFloat64(pos, true);
                if (pos + 8 < buffer.byteLength && view.getUint8(pos + 8) === 0xEE) {
                    let lastVal = view.getInt32(pos + 9, true);
                    fullECG.push({ ts, val: lastVal });
                    pos += 13;
                    
                    // Folge-Deltas lesen bis nächster Header
                    while (pos + 1 < buffer.byteLength) {
                        if (view.getUint8(pos) === 0xAA) break;
                        if (pos + 8 < buffer.byteLength && view.getUint8(pos + 8) === 0xEE) break;
                        
                        lastVal += view.getInt16(pos, true);
                        fullECG.push({ ts, val: lastVal });
                        pos += 2;
                    }
                } else {
                    pos++;
                }
            }
        }
        log(fullECG.length + " EKG Proben rekonstruiert.");
        initReviewMode();
    };
    reader.readAsArrayBuffer(file);
}

function initReviewMode() {
    document.getElementById("scroll-container").style.display = "block";
    const slider = document.getElementById("ekgScroll");
    slider.max = Math.max(0, fullECG.length - 600);
    slider.value = 0;
    calculateGlobalHRV();
    updateScroll();
}

function updateScroll() {
    const start = parseInt(document.getElementById("ekgScroll").value);
    const segment = fullECG.slice(start, start + 600);
    ecgDisplay = segment.map(e => e.val);
    
    if (segment[0]) {
        const t = segment[0].ts;
        currentIndex = allRRData.findIndex(r => r.ts >= t);
    }
    drawECG(); drawLorentz();
}

async function connect() {
    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ services: ['heart_rate'] }],
            optionalServices: ['battery_service', 'fb005c80-02e7-f387-1cad-8acd2d8df0c8']
        });
        server = await device.gatt.connect();
        document.getElementById("status").innerText = "Verbunden";
        log("Sensor verbunden.");
        
        const bS = await server.getPrimaryService('battery_service');
        const bV = await (await bS.getCharacteristic('battery_level')).readValue();
        document.getElementById("batt").innerText = bV.getUint8(0);
        
        const hS = await server.getPrimaryService('heart_rate');
        const hC = await hS.getCharacteristic('heart_rate_measurement');
        await hC.startNotifications();
        hC.addEventListener('characteristicvaluechanged', e => {
            const v = e.target.value;
            let offset = (v.getUint8(0) & 0x01) ? 3 : 2;
            for (let i = offset; i < v.byteLength; i += 2) {
                const val = (v.getUint16(i, true) / 1024) * 1000;
                if (val > 300) {
                    const ts = Date.now();
                    allRRData.push({ ts, val });
                    db.samples.add({ timestamp: ts, type: 'RR', val }).catch(()=>{});
                    calculateGlobalHRV();
                }
            }
        });
        requestAnimationFrame(renderLoop);
    } catch (e) { log("Verbindung fehlgeschlagen oder verloren."); console.error(e); }
}

// Handler für eingehende EKG-Daten extrahiert, um Listener sauber zu entfernen
function handleEcgData(e) {
    const dv = e.target.value;
    const ts = Date.now();
    const batch = [];
    
    for(let i=10; i < dv.byteLength; i+=3) {
        let val = (dv.getUint8(i) | (dv.getUint8(i+1) << 8) | (dv.getUint8(i+2) << 16));
        if (val & 0x800000) val |= 0xFF000000;
        fullECG.push({ ts, val });
        batch.push(val);
        if (fullECG.length > 2000) fullECG.shift();
    }
    
    const buf = new ArrayBuffer(5 + (batch.length - 1) * 2);
    const v = new DataView(buf);
    v.setUint8(0, 0xEE);
    v.setInt32(1, batch[0], true);
    for(let i=1; i<batch.length; i++) {
        v.setInt16(5 + (i-1)*2, batch[i] - batch[i-1], true);
    }
    db.samples.add({ timestamp: ts, type: 'ECG_BIN', val: new Uint8Array(buf) }).catch(()=>{});
}

async function toggleECG() {
    if (!server) { log("Bitte zuerst Sensor verbinden!"); return; }
    
    try {
        if (!ctrlCharacteristic || !dataCharacteristic) {
            const s = await server.getPrimaryService('fb005c80-02e7-f387-1cad-8acd2d8df0c8');
            ctrlCharacteristic = await s.getCharacteristic('fb005c81-02e7-f387-1cad-8acd2d8df0c8');
            dataCharacteristic = await s.getCharacteristic('fb005c82-02e7-f387-1cad-8acd2d8df0c8');
        }
        
        if (!ecgActive) {
            // EKG STARTEN
            await dataCharacteristic.startNotifications();
            dataCharacteristic.addEventListener('characteristicvaluechanged', handleEcgData);
            
            // Polar H10 Stream-Request (EKG @ 130Hz)
            await ctrlCharacteristic.writeValue(new Uint8Array([0x02,0x00,0x00,0x01,0x82,0x00,0x01,0x01,0x0E,0x00]));
            
            ecgActive = true; 
            document.getElementById("ecgToggleBtn").innerText = "STOP";
            document.getElementById("ecgToggleBtn").style.background = "#d00";
            document.getElementById("status").innerText = "Live + EKG";
            log("EKG Stream gestartet.");
        } else {
            // FIX: EKG STOPPEN
            log("Stoppe EKG Stream...");
            // Polar H10 Stop-Signal senden (0x01 = Stop, 0x00 = EKG)
            await ctrlCharacteristic.writeValue(new Uint8Array([0x01, 0x00]));
            
            await dataCharacteristic.stopNotifications();
            dataCharacteristic.removeEventListener('characteristicvaluechanged', handleEcgData);
            
            ecgActive = false;
            document.getElementById("ecgToggleBtn").innerText = "EKG STARTEN";
            document.getElementById("ecgToggleBtn").style.background = "#555";
            document.getElementById("status").innerText = "Verbunden";
            log("EKG Stream gestoppt.");
        }
    } catch (e) {
        log("Fehler bei EKG Toggle.");
        console.error(e);
    }
}

async function exportBinary() {
    log("Bereite Export vor...");
    try {
        // Sicherstellen, dass Dexie alle Daten geladen hat
        const all = await db.samples.toArray();
        if (all.length === 0) {
            log("Keine Daten zum Speichern vorhanden.");
            return;
        }

        let parts = [];
        all.forEach(r => {
            if (r.type === 'RR') {
                const b = new ArrayBuffer(11); const v = new DataView(b);
                v.setUint8(0, 0xAA); v.setFloat64(1, r.timestamp, true); v.setUint16(9, r.val, true);
                parts.push(new Uint8Array(b));
            } else if (r.type === 'ECG_BIN') {
                const tsB = new ArrayBuffer(8); new DataView(tsB).setFloat64(0, r.timestamp, true);
                parts.push(new Uint8Array(tsB));
                parts.push(r.val);
            }
        });
        
        const blob = new Blob(parts, {type: 'application/octet-stream'});
        const vorgeschlagenerName = `H10_Session_${Date.now()}.bin`;

        // PRÜFUNG: Unterstützt der Browser das "Speichern unter"-Menü? (File System Access API)
        if (window.showSaveFilePicker) {
            log("Öffne Speicher-Menü...");
            const options = {
                suggestedName: vorgeschlagenerName,
                types: [{
                    description: 'Polar H10 Binärdatei',
                    accept: { 'application/octet-stream': ['.bin'] }
                }]
            };
            
            // Das öffnet das native Betriebssystem-Menü ("Speichern unter")
            const handle = await window.showSaveFilePicker(options);
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            
            log("Datei erfolgreich am gewählten Ort gespeichert.");
  
        } else {
            // OPTIMIERT FÜR IPHONE / BLUEFY: Nutzt das iOS Share-Menü
            log("iOS erkannt. Öffne Teilen-Menü...");
            
            // Wir erstellen ein echtes File-Objekt aus dem Blob
            const file = new File([blob], vorgeschlagenerName, { type: 'application/octet-stream' });
            
            // Prüfen, ob das System Dateien teilen kann (Navigator.share)
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    files: [file],
                    title: 'Polar H10 Export',
                    text: 'Hier ist deine EKG-Sitzung'
                });
                log("Teilen-Menü erfolgreich geschlossen.");
            } else {
                // Letzter Not-Fallback, falls Teilen blockiert ist
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = vorgeschlagenerName;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 1000);
                log("In 'Downloads' der Dateien-App gespeichert.");
            }
        }
    } catch (err) {
        // Wenn der Benutzer im Menü auf "Abbrechen" klickt, landen wir hier
        if (err.name === 'AbortError') {
            log("Speichervorgang vom Benutzer abgebrochen.");
        } else {
            log("Export-Fehler.");
            console.error(err);
        }
    }
}

function drawECG() {
  const canvas = document.getElementById("ecgCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  const data = ecgActive ? fullECG.slice(-600).map(e => e.val) : ecgDisplay;
  if (data.length < 2) return;

  let min = Math.min(...data), max = Math.max(...data), range = (max - min) || 1;
  ctx.beginPath(); ctx.strokeStyle = "#0f0"; ctx.lineWidth = 1.5;
  for(let i=0; i<data.length; i++) {
    const x = i * (canvas.width / data.length);
    const y = canvas.height - 10 - ((data[i] - min) / range) * (canvas.height - 20);
    if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawLorentz() {
    const canvas = document.getElementById("lorentzCanvas");
    const ctx = canvas.getContext("2d");
    const w = 400, p = 40, size = 320;
    ctx.clearRect(0, 0, w, w);
    
    ctx.strokeStyle = "#333";
    ctx.strokeRect(p, p, size, size);
    
    ctx.fillStyle = "rgba(0, 255, 0, 0.3)";
    for (let i = 1; i < allRRData.length; i++) {
        const x = p + ((allRRData[i-1].val - 300) / 1300) * size;
        const y = p + size - ((allRRData[i].val - 300) / 1300) * size;
        if(x >= p && x <= p+size && y >= p && y <= p+size) {
            ctx.beginPath(); ctx.arc(x, y, 1.5, 0, 7); ctx.fill();
        }
    }
    
    if (currentIndex >= 1 && currentIndex < allRRData.length) {
        const x = p + ((allRRData[currentIndex-1].val - 300) / 1300) * size;
        const y = p + size - ((allRRData[currentIndex].val - 300) / 1300) * size;
        ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(x, y, 6, 0, 7); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
    }
}

// FIX: Zeichnet Lorentz-Plot unabhängig davon, ob EKG läuft oder nicht
function renderLoop() { 
    if(ecgActive) { 
        drawECG(); 
    }
    // Lorentz-Plot/Poincaré baut auf RR-Daten auf, läuft also immer sobald verbunden!
    if(allRRData.length > 0) {
        drawLorentz(); 
    } 
    requestAnimationFrame(renderLoop); 
}
</script>    
</body>
</html>

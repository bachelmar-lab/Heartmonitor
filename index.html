<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Polar H10 Monitor 2.7 (Legacy Data Fix)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
<style>
    body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding:10px; }
    h2 { text-align:center; color:#0f0; margin:5px 0; font-size: 18px; }
    button { width:100%; padding:14px; margin:4px 0; font-size:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
    .connect { background:#0f0; color:#000; }
    .btn-rr { background:#44f; color:#fff; }
    .btn-import { background:#666; color:#fff; }
    .metrics-grid { display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin:10px 0; }
    .metric { background:#111; padding:10px; border-radius:10px; text-align:center; border: 1px solid #333; }
    .val { font-size:22px; font-weight:bold; color:#0f0; display:block; }
    .label { font-size:10px; color:#aaa; text-transform: uppercase; }
    canvas { background:#000; border-radius:10px; width:100%!important; border:1px solid #222; }
    #debug-log { background:#111; color:#0f0; font-family:monospace; font-size:10px; height:50px; overflow-y:auto; padding:5px; margin-top:5px; }
</style>
</head>
<body>

<h2>Polar H10 Monitor 2.7</h2>

<button class="connect" onclick="connect()">SENSOR VERBINDEN</button>
<button class="btn-import" onclick="document.getElementById('fileInput').click()">CSV IMPORT (ALTE DATEN FIX)</button>
<input type="file" id="fileInput" style="display:none" accept=".csv" onchange="importCSV(event)">
<button class="btn-rr" onclick="exportRR()">CLEAN EXPORT (CSV)</button>

<div class="metrics-grid">
  <div class="metric"><span id="bpm" class="val">--</span><span class="label">Puls (Ø)</span></div>
  <div class="metric"><span id="rmssd" class="val">--</span><span class="label">RMSSD (ms)</span></div>
  <div class="metric"><span id="sd1" class="val">--</span><span class="label">SD1 (ms)</span></div>
  <div class="metric"><span id="sd2" class="val">--</span><span class="label">SD2 (ms)</span></div>
</div>

<canvas id="lorentzCanvas" width="400" height="400" style="width:320px!important; margin:10px auto; display:block;"></canvas>
<div id="debug-log">> System bereit.</div>

<script>
let allRRData = [];

function log(msg) {
    const l = document.getElementById("debug-log");
    l.innerHTML += "> " + msg + "<br>";
    l.scrollTop = l.scrollHeight;
}

function calculateGlobalHRV() {
    // Strenger Filter für die Statistik (350ms - 1500ms)
    const d = allRRData.filter(v => v >= 350 && v <= 1500);
    if (d.length < 5) return;

    // RMSSD
    let diffsSq = 0, count = 0;
    for(let i=1; i < d.length; i++) {
        let diff = d[i] - d[i-1];
        if (Math.abs(diff) < 400) { // Plausibilitäts-Check für den Sprung
            diffsSq += diff * diff;
            count++;
        }
    }
    const rmssd = Math.sqrt(diffsSq / (count || 1));
    
    // SDNN & Poincaré
    const avg = d.reduce((a, b) => a + b) / d.length;
    const variance = d.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / d.length;
    const sdnn = Math.sqrt(variance);
    const sd1 = Math.sqrt(0.5 * Math.pow(rmssd, 2));
    const sd2 = Math.sqrt(Math.max(0, 2 * Math.pow(sdnn, 2) - Math.pow(sd1, 2)));

    document.getElementById("rmssd").innerText = rmssd.toFixed(1);
    document.getElementById("sd1").innerText = sd1.toFixed(1);
    document.getElementById("sd2").innerText = sd2.toFixed(1);
    document.getElementById("bpm").innerText = Math.round(60000 / avg);
}

function importCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const lines = e.target.result.split("\n");
        let temp = [];
        log("Fixing Legacy Data...");
        
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(/[;,]/);
            if (cols.length < 2) continue;
            let raw = cols.length === 2 ? cols[1] : (cols[1].trim() === "RR" ? cols[2] : "");
            if (!raw) continue;

            let val = parseFloat(raw.replace(',', '.'));
            
            // LEGACY FIX LOGIC:
            if (val > 3000) val = (val / 1024) * 1000; // Falls Rohwerte geloggt wurden
            else if (val < 5) val *= 1000;              // Falls Sekunden geloggt wurden
            
            // Nur plausible menschliche RR-Intervalle (40-170 bpm)
            if (val >= 350 && val <= 1500) temp.push(val);
        }
        
        allRRData = temp;
        document.getElementById("debug-log").innerHTML = ""; // Clear log
        log(allRRData.length + " Punkte bereinigt geladen.");
        calculateGlobalHRV();
        drawLorentz();
    };
    reader.readAsText(file);
}

function drawLorentz() {
    const canvas = document.getElementById("lorentzCanvas");
    const ctx = canvas.getContext("2d");
    const w = 400, p = 45, size = 340;
    ctx.clearRect(0, 0, w, w);
    
    // Achsen Zeichnen
    ctx.strokeStyle = "#444"; ctx.strokeRect(p, 5, size, size);
    ctx.fillStyle = "#888"; ctx.font = "12px Arial";
    for(let v=400; v<=1400; v+=200) {
        let pos = p + ((v-400)/1000) * size;
        ctx.fillText(v, pos-12, size+25);
        ctx.save(); ctx.translate(p-10, size-((v-400)/1000)*size); ctx.rotate(-Math.PI/2); ctx.fillText(v, -10, 0); ctx.restore();
    }

    // Daten Plotten (Transparenz für Wolkenbildung)
    ctx.fillStyle = "rgba(0, 255, 0, 0.25)";
    for (let i = 1; i < allRRData.length; i++) {
        const x = p + ((allRRData[i-1] - 400) / 1000) * size;
        const y = size - ((allRRData[i] - 400) / 1000) * size;
        if(x >= p && x <= (p + size) && y >= 5 && y <= (5 + size)) {
            ctx.beginPath(); ctx.arc(x, y, 1.2, 0, 7); ctx.fill();
        }
    }
}

async function exportRR() {
    if (allRRData.length === 0) return alert("Keine Daten!");
    let csv = "Timestamp;RR_ms\n" + allRRData.map((v, i) => `${Date.now()+i};${v.toFixed(1)}`).join("\n");
    const blob = new Blob([csv], {type: 'text/csv'});
    const file = new File([blob], `Clean_RR_${Date.now()}.csv`, {type: 'text/csv'});
    if (navigator.share) await navigator.share({ files: [file] });
}
</script>
</body>
</html>
